interface:
  display_name: "Software Engineer"
  short_description: "Implement features and bugfixes for the Gleam-based LTI 1.3 example tool lti-example-tool."
  default_prompt: "Use $software-engineer to investigate or implement a bugfix/feature in lti-example-tool. Follow the repo architecture (application/router/controllers/repositories), preserve explicit Result-driven routing/controller patterns, and validate with: gleam build, gleam run -m lti_example_tool/database/migrate test.setup, gleam test, gleam format --check src test. For larger work, follow docs/features/<feature>/prd.md, fdd.md, and plan.md."
