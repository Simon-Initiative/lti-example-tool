apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lti-example-tool
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  rules:
    - host: __INGRESS_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lti-example-tool
                port:
                  number: 80
